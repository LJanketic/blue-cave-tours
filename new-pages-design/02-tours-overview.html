<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tours Overview — Adriatic Sails</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --color-text-primary: #111;
    --color-text-secondary: #555;
    --color-text-tertiary: #999;
    --color-text-info: #1a6fc4;
    --color-text-success: #085041;
    --color-text-danger: #8B1A15;
    --color-text-warning: #BA7517;
    --color-background-primary: #fff;
    --color-background-secondary: #f5f5f4;
    --color-background-info: #e6f1fb;
    --color-background-success: #e1f5ee;
    --color-border-primary: #aaa;
    --color-border-secondary: #ccc;
    --color-border-tertiary: #e5e5e3;
    --color-border-info: #7ab4e8;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: var(--color-background-primary); color: var(--color-text-primary); max-width: 960px; margin: 0 auto; }
  input, select, button, textarea { font-family: var(--font-sans); padding: 8px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--color-border-primary); }
</style>
<style>

.page { padding: 1.5rem 0 2rem; font-size: 14px; }
.hero-bar { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 24px; display: flex; flex-direction: column; gap: 10px; }
.hero-title { font-size: 20px; font-weight: 500; margin: 0 0 2px; }
.hero-sub { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 16px; }
.search-row { display: flex; gap: 8px; }
.search-row input { flex: 1; }
.search-row button { padding: 0 14px; font-size: 13px; cursor: pointer; border-radius: var(--border-radius-md); background: var(--color-text-primary); color: var(--color-background-primary); border: none; }
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
.filter-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; }
.filter-chip:hover { background: var(--color-background-secondary); }
.filter-chip.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.sort-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.result-count { font-size: 13px; color: var(--color-text-secondary); }
.section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px; }
.tour-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; margin-bottom: 28px; }
.tour-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; cursor: pointer; }
.tour-card:hover { border-color: var(--color-border-primary); }
.tour-card.featured { border: 2px solid var(--color-border-info); }
.card-img { height: 148px; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; position: relative; }
.card-img i { font-size: 36px; color: var(--color-border-secondary); }
.img-badges { position: absolute; top: 8px; left: 8px; display: flex; gap: 5px; flex-wrap: wrap; }
.img-badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
.badge-bestseller { background: #FAEEDA; color: #633806; }
.badge-new { background: #E1F5EE; color: #085041; }
.badge-private { background: #EEEDFE; color: #3C3489; }
.badge-group { background: #E1F5EE; color: #085041; }
.wishlist-btn { position: absolute; top: 8px; right: 8px; width: 30px; height: 30px; border-radius: 50%; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.wishlist-btn i { font-size: 14px; color: var(--color-text-secondary); }
.card-body { padding: 12px 14px 14px; }
.card-title { font-size: 14px; font-weight: 500; margin: 0 0 5px; }
.card-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--color-text-secondary); }
.card-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; margin: 0 0 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
.price-from { font-size: 11px; color: var(--color-text-tertiary); }
.price-val { font-size: 16px; font-weight: 500; }
.price-per { font-size: 11px; color: var(--color-text-secondary); }
.card-rating { display: flex; align-items: center; gap: 4px; font-size: 12px; }
.stars { color: #BA7517; font-size: 12px; }
.no-results { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 13px; display: none; }

</style>
<style>
@media (max-width:768px){
  body{padding:16px;}
}
@media (max-width:480px){
  body{padding:12px;}
  .search-row{flex-direction:column;}
}
</style>
</head>
<body>

<div class="page">
  <div class="hero-bar">
    <div><p class="hero-title">Our tours</p><p class="hero-sub">14 experiences along the Adriatic coast — group departures and private charters</p></div>
    <div class="search-row"><input type="text" placeholder="Search tours or destinations…" id="search-input" oninput="filterTours()"><button onclick="filterTours()"><i class="ti ti-search" style="font-size:13px;vertical-align:-1px"></i> Search</button></div>
  </div>
  <div class="filter-bar">
    <span style="font-size:12px;color:var(--color-text-tertiary);margin-right:2px">Filter:</span>
    <span class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">All tours</span>
    <span class="filter-chip" data-filter="group" onclick="setFilter('group',this)"><i class="ti ti-users"></i> Group</span>
    <span class="filter-chip" data-filter="private" onclick="setFilter('private',this)"><i class="ti ti-crown"></i> Private</span>
    <span class="filter-chip" data-filter="short" onclick="setFilter('short',this)"><i class="ti ti-clock"></i> Under 2h</span>
    <span class="filter-chip" data-filter="sunset" onclick="setFilter('sunset',this)"><i class="ti ti-sunset"></i> Sunset</span>
    <span class="filter-chip" data-filter="swim" onclick="setFilter('swim',this)"><i class="ti ti-swimming"></i> Swimming</span>
  </div>
  <div class="sort-row">
    <span class="result-count" id="result-count">Showing 6 tours</span>
    <select onchange="sortTours(this.value)"><option value="popular">Sort: most popular</option><option value="price-asc">Price: low to high</option><option value="price-desc">Price: high to low</option><option value="duration">Duration</option><option value="rating">Top rated</option></select>
  </div>
  <p class="section-label" data-section="featured">Featured</p>
  <div class="tour-grid" id="featured-grid"></div>
  <p class="section-label" data-section="all">All tours</p>
  <div class="tour-grid" id="tours-grid"></div>
  <div class="no-results" id="no-results"><i class="ti ti-mood-sad" style="font-size:28px;display:block;margin-bottom:8px;color:var(--color-border-secondary)"></i>No tours match your filters.</div>
</div>

<script>
const tours = [
  { id:1, title:'Sunset Bay coastal cruise', icon:'ti-sailboat', duration:'3h', type:['group','private'], tags:['sunset','swim'], price:55, rating:4.9, reviews:128, desc:'Sea caves, hidden coves, and golden-hour views past the old town walls.', badge:'bestseller', featured:true },
  { id:2, title:'Island hopping — Elafiti day trip', icon:'ti-ship', duration:'7h', type:['group'], tags:['swim'], price:89, rating:4.8, reviews:94, desc:'Visit three islands in one day with swimming stops, a village lunch, and a local guide.', badge:null, featured:true },
  { id:3, title:'Private sunset charter', icon:'ti-sailboat', duration:'2h', type:['private'], tags:['sunset'], price:320, rating:5.0, reviews:41, desc:'Fully private boat for up to 8 guests. Champagne, custom route, no shared departures.', badge:'private', featured:false },
  { id:4, title:'Morning snorkel tour', icon:'ti-swimming', duration:'2h', type:['group'], tags:['swim'], price:45, rating:4.7, reviews:67, desc:'Early-morning calm water, mask and fins included, reef guide on board.', badge:'new', featured:false },
  { id:5, title:'Blue Cave & Hvar full day', icon:'ti-map', duration:'10h', type:['group'], tags:['swim'], price:110, rating:4.9, reviews:203, desc:'The classic Dalmatian bucket-list route. Blue Cave, Vis, Hvar, and back by sunset.', badge:'bestseller', featured:false },
  { id:6, title:'Romantic private dinner cruise', icon:'ti-heart', duration:'3h', type:['private'], tags:['sunset'], price:280, rating:4.9, reviews:29, desc:'Candlelit dinner on the water for two, with a chef-prepared three-course menu.', badge:'private', featured:false },
];
let activeFilter = 'all', activeSearch = '';
function badgeHtml(badge) {
  if (!badge) return '';
  const map = { bestseller:'badge-bestseller', new:'badge-new', private:'badge-private' };
  const labels = { bestseller:'Best seller', new:'New', private:'Private only' };
  return '<span class="img-badge ' + map[badge] + '">' + labels[badge] + '</span>';
}
function typeHtml(types) {
  return types.map(t => t === 'group' ? '<span class="img-badge badge-group">Group</span>' : '<span class="img-badge badge-private">Private</span>').join('');
}
function cardHtml(t) {
  return '<div class="tour-card' + (t.featured?' featured':'') + '"><div class="card-img"><i class="ti ' + t.icon + '"></i><div class="img-badges">' + badgeHtml(t.badge) + typeHtml(t.type) + '</div><div class="wishlist-btn"><i class="ti ti-heart"></i></div></div><div class="card-body"><p class="card-title">' + t.title + '</p><div class="card-meta"><span class="meta-item"><i class="ti ti-clock"></i>' + t.duration + '</span><span class="meta-item"><i class="ti ti-users"></i>' + t.type.join(' / ') + '</span></div><p class="card-desc">' + t.desc + '</p><div class="card-footer"><div><span class="price-from">From </span><span class="price-val">€' + t.price + '</span><span class="price-per"> / person</span></div><div class="card-rating"><span class="stars">★</span><strong>' + t.rating + '</strong><span style="color:var(--color-text-tertiary)">(' + t.reviews + ')</span></div></div></div></div>';
}
function getFiltered() {
  return tours.filter(t => {
    const mf = activeFilter==='all'||(activeFilter==='group'&&t.type.includes('group'))||(activeFilter==='private'&&t.type.includes('private'))||(activeFilter==='short'&&parseInt(t.duration)<3)||(activeFilter==='sunset'&&t.tags.includes('sunset'))||(activeFilter==='swim'&&t.tags.includes('swim'));
    const ms = !activeSearch||t.title.toLowerCase().includes(activeSearch)||t.desc.toLowerCase().includes(activeSearch);
    return mf&&ms;
  });
}
function renderTours() {
  const filtered = getFiltered();
  const featured = filtered.filter(t=>t.featured), rest = filtered.filter(t=>!t.featured);
  const fGrid = document.getElementById('featured-grid'), tGrid = document.getElementById('tours-grid');
  fGrid.innerHTML = featured.map(cardHtml).join('');
  tGrid.innerHTML = rest.map(cardHtml).join('');
  document.querySelector('[data-section="featured"]').style.display = featured.length?'':'none';
  fGrid.style.display = featured.length?'':'none';
  document.querySelector('[data-section="all"]').style.display = rest.length?'':'none';
  tGrid.style.display = rest.length?'':'none';
  document.getElementById('no-results').style.display = filtered.length===0?'':'none';
  document.getElementById('result-count').textContent = 'Showing ' + filtered.length + ' tour' + (filtered.length!==1?'s':'');
}
function setFilter(f,el) { activeFilter=f; document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); renderTours(); }
function filterTours() { activeSearch=document.getElementById('search-input').value.toLowerCase().trim(); renderTours(); }
function sortTours(val) {
  if(val==='price-asc') tours.sort((a,b)=>a.price-b.price);
  else if(val==='price-desc') tours.sort((a,b)=>b.price-a.price);
  else if(val==='duration') tours.sort((a,b)=>parseInt(a.duration)-parseInt(b.duration));
  else if(val==='rating') tours.sort((a,b)=>b.rating-a.rating);
  else tours.sort((a,b)=>b.reviews-a.reviews);
  renderTours();
}
renderTours();
</script>
</body>
</html>
